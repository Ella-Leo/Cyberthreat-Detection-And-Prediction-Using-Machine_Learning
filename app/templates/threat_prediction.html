<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Threat Prediction System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            padding-top: 40px;
        }

        h2 {
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        input[type="file"] {
            padding: 10px;
            background: #334155;
            color: white;
            border-radius: 5px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            background: #38bdf8;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #334155;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background: #0f172a;
        }

        .normal {
            color: #22c55e;
            font-weight: bold;
        }

        .threat {
            color: #ef4444;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>🛡️ Threat Detection System</h2>

    <div class="card">

        <form method="POST" enctype="multipart/form-data">
            <label>Upload CSV File</label><br><br>
            <input type="file" name="file" required>
            <br>
            <button type="submit">Run Detection</button>
        </form>

    </div>

    {% if data is not none and predictions is not none %}

    <div class="card">

        <h3>Results</h3>

        <table>
            <tr>
                <th>Row</th>
                <th>Prediction</th>
                <th>Model</th>
            </tr>

            {% for p in predictions %}
            <tr>
                <td>{{ p.row }}</td>

                <td class="{% if p.prediction == 'Threat' %}threat{% else %}normal{% endif %}">
                    {{ p.prediction }}
                </td>

                <td>{{ p.model }}</td>
            </tr>
            {% endfor %}

        </table>

    </div>

    {% endif %}

</div>

</body>
</html>
