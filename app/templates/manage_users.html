{% extends "base.html" %}
{% block content %}

<div class="card p-3">
    <h4>Manage Users</h4>
<form method="POST">

    <input name="username"
           class="form-control mb-2"
           placeholder="Username"
           required>

    <input name="email"
           type="email"
           class="form-control mb-2"
           placeholder="Email"
           required>

    <input name="password"
           type="password"
           class="form-control mb-2"
           placeholder="Password"
           required>

    <input name="role"
           class="form-control mb-2"
           placeholder="Role"
           value="user">

    <button type="submit" class="btn btn-primary">
        Add User
    </button>

</form>

    <hr>

    <table class="table table-dark">
        <tr>
            <th>Username</th>
            <th>Email</th>
            <th>Role</th>
            <th>Action</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.email }}</td>
            <td>{{ user.role }}</td>
            <td>
                <a href="{{ url_for('delete_user', user_id=user.id) }}"
                   class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
